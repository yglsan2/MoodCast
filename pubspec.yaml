name: moodcast_worldflow
description: "MoodCast & WorldFlow - Applications mobiles pour l'expérience émotionnelle (version Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  record: ^6.0.0
  flutter_tts: ^4.0.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.19.0
  path: ^1.9.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^10.0.2
  audioplayers: ^6.1.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  google_fonts: ^6.2.1
  tflite_flutter: ^0.12.1
  fft: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/ser_quant.tflite
